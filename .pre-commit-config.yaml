# Pre-commit Configuration
# 
# What is pre-commit?
# Pre-commit is a tool that runs checks on your code BEFORE you commit it to git.
# It helps catch common issues like:
# - Code formatting problems
# - Syntax errors
# - Security issues
# - Large files accidentally being committed
# 
# How it works:
# 1. Install with: pip install pre-commit
# 2. Set up with: pre-commit install
# 3. Now every time you run 'git commit', these hooks run automatically
# 4. If any hook fails, the commit is blocked until you fix the issues
# 
# You can also run manually with: pre-commit run --all-files
# 
# Each 'hook' below is a different check that runs on your code.
# Your team can customize this based on your coding standards.

repos:
  # Basic file checks (trailing spaces, line endings, etc.)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace        # Remove extra spaces at end of lines
      - id: end-of-file-fixer          # Ensure files end with a newline
      - id: check-yaml                 # Validate YAML syntax
      - id: check-added-large-files    # Prevent committing large files
      - id: check-case-conflict        # Check for case-sensitive filename conflicts
      - id: check-merge-conflict       # Check for unresolved merge conflicts
      - id: debug-statements           # Find leftover debug statements
      - id: check-json                 # Validate JSON syntax
      - id: pretty-format-json         # Auto-format JSON files
        args: ['--autofix']
      - id: check-toml                 # Validate TOML syntax
      - id: check-xml                  # Validate XML syntax
      - id: mixed-line-ending          # Ensure consistent line endings
        args: ['--fix=lf']

  # Python code formatting with Black
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=88']     # Standard line length

  # Python import sorting with isort
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length=88"]  # Compatible with Black

  # Python linting with flake8
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=88', '--extend-ignore=E203,W503']
        additional_dependencies: [flake8-docstrings]  # Check docstring style

  # Python type checking with mypy
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-PyYAML
          - types-python-dateutil
        args: [--strict, --ignore-missing-imports]
        exclude: ^src/generated/  # Skip generated code

  # Security scanning with bandit
  - repo: https://github.com/pycqa/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ['-r', 'src', '-x', 'src/generated']  # Recursively check src, exclude generated

  # Dependency security check
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.2
    hooks:
      - id: python-safety-dependencies-check  # Check for known security vulnerabilities

  # Custom hooks for your project
  - repo: local
    hooks:
      - id: generate-proto
        name: Generate gRPC code from proto files
        entry: make proto
        language: system
        files: '\.proto$'
        pass_filenames: false
        # Note: This will run when .proto files change
        # Currently proto is a template, so this may not do anything until you define your service