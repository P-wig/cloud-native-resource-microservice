name: hardware-microservice

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  hardware-service:
    build:
      context: .
    ports:
      - "50051:50051"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=hardware_service
      - GRPC_PORT=50051
    depends_on:
      - mongo
    volumes:
      - ./app:/app/app
      - ./run.py:/app/run.py

volumes:
  mongo_data:
