# Docker Compose for your microservice
# Customize this for your team's needs

version: '3.8'

services:
  # Your main microservice
  hardware-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
    environment:
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=50051
      - LOG_LEVEL=INFO
      - ENVIRONMENT=docker
    networks:
      - app-network
    restart: unless-stopped

